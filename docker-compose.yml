services:
  postgres:
    # PostGIS 3.4 + pgRouting 3.6 on PostgreSQL 16 (superset of postgis/postgis:16-3.4).
    # pgRouting is needed for the walkable road graph / future safe-route path queries.
    image: pgrouting/pgrouting:16-3.4-3.6.1
    container_name: postgres
    restart: unless-stopped
    # Docker's default /dev/shm (64 MB) starves parallel queries on the
    # risk-scoring joins ("could not resize shared memory segment"). The
    # pipeline also disables parallel gather per session as a belt-and-braces.
    shm_size: 1g
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-caba_routes}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-caba_routes}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    # Backs distributed rate limiting and the /routes/safe route cache.
    # appendonly keeps counters/cache across restarts. The API runs on the host
    # (no api service here), so Redis is published on localhost:6379.
    image: redis:7-alpine
    container_name: safe-routes-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
