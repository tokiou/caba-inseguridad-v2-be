openapi: 3.0.3
info:
  title: CABA Inseguridad API
  version: 0.2.0
  description: |
    Backend para **CABA Rutas Seguras**.
    Dado dos puntos dentro de CABA, devuelve una ruta y expone datos de criminalidad cercanos.

servers:
  - url: /api/v1
    description: API base path

tags:
  - name: Health
    description: Estado de la API
  - name: Crimes
    description: Consulta de crímenes cercanos
  - name: Routes
    description: Cálculo de rutas dentro de CABA

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Verifica que la API esté levantada correctamente.
      operationId: getHealth
      responses:
        "200":
          description: API funcionando correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok

  /crimes/nearby:
    get:
      tags:
        - Crimes
      summary: Crímenes cercanos a un punto
      description: |
        Devuelve todos los crímenes registrados dentro del radio especificado
        alrededor de las coordenadas dadas. Ambas coordenadas deben estar dentro de CABA.
      operationId: getNearbyCrimes
      parameters:
        - name: lat
          in: query
          required: true
          description: Latitud del punto central (debe estar entre -35 y -34)
          schema:
            type: number
            format: double
            example: -34.6037
        - name: lng
          in: query
          required: true
          description: Longitud del punto central (debe estar entre -59 y -58)
          schema:
            type: number
            format: double
            example: -58.3816
        - name: radius
          in: query
          required: false
          description: Radio de búsqueda en metros (1–2000, default 300)
          schema:
            type: integer
            minimum: 1
            maximum: 2000
            default: 300
            example: 500
      responses:
        "200":
          description: Lista de crímenes cercanos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NearbyCrimesResponse"
        "400":
          description: Parámetros inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: invalid_request
                message: lat and lng are required and must be valid CABA coordinates
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /routes:
    get:
      tags:
        - Routes
      summary: Calcular ruta entre dos puntos dentro de CABA
      description: |
        Devuelve una ruta entre origen y destino, delegando el cálculo a OpenRouteService.
        Ambos puntos deben estar dentro de CABA (lat ∈ [-35, -34], lng ∈ [-59, -58]).
      operationId: getRoute
      parameters:
        - name: origin_lat
          in: query
          required: true
          description: Latitud del punto de origen
          schema:
            type: number
            format: double
            example: -34.6037
        - name: origin_lng
          in: query
          required: true
          description: Longitud del punto de origen
          schema:
            type: number
            format: double
            example: -58.3816
        - name: dest_lat
          in: query
          required: true
          description: Latitud del punto de destino
          schema:
            type: number
            format: double
            example: -34.5895
        - name: dest_lng
          in: query
          required: true
          description: Longitud del punto de destino
          schema:
            type: number
            format: double
            example: -58.4201
        - name: profile
          in: query
          required: false
          description: Perfil de transporte
          schema:
            type: string
            enum:
              - driving-car
              - foot-walking
              - cycling-regular
            default: driving-car
            example: driving-car
      responses:
        "200":
          description: Ruta calculada correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteResponse"
        "400":
          description: Parámetros inválidos (coordenadas fuera de CABA, mismo punto, perfil inválido)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_coords:
                  summary: Coordenadas fuera de CABA
                  value:
                    error: invalid_request
                    message: origin and destination must be valid CABA coordinates
                same_point:
                  summary: Origen igual a destino
                  value:
                    error: invalid_request
                    message: origin and destination must not be the same point
                invalid_profile:
                  summary: Perfil inválido
                  value:
                    error: invalid_request
                    message: "profile must be one of: driving-car, foot-walking, cycling-regular"
        "404":
          description: No se encontró ruta entre los puntos dados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: route_not_found
                message: no route found between the given points
        "502":
          description: OpenRouteService no disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: external_service_error
                message: route service is temporarily unavailable
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /routes/safe:
    get:
      tags:
        - Routes
      summary: Rutas caminables con exposición histórica estimada al delito
      description: |
        Calcula cuatro rutas caminables entre origen y destino sobre el grafo propio de CABA,
        usando los risk scores precomputados del modelo activo (Network Temporal KDE):
        `fastest`, `balanced`, `safest` y `least_safe_candidate`. Todas las cifras son
        **exposición histórica estimada**, nunca garantías de seguridad.
      operationId: getSafeRoutes
      parameters:
        - name: origin_lat
          in: query
          required: true
          schema: { type: number, format: double, example: -34.58 }
        - name: origin_lng
          in: query
          required: true
          schema: { type: number, format: double, example: -58.42 }
        - name: dest_lat
          in: query
          required: true
          schema: { type: number, format: double, example: -34.60 }
        - name: dest_lng
          in: query
          required: true
          schema: { type: number, format: double, example: -58.38 }
        - name: datetime
          in: query
          required: false
          description: Momento de la caminata (RFC3339); por defecto, ahora en hora de Buenos Aires. Determina el contexto de riesgo (time_bucket + weekday_type).
          schema:
            type: string
            format: date-time
            example: "2026-06-12T23:00:00-03:00"
      responses:
        "200":
          description: Rutas calculadas correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafeRoutesResponse"
        "400":
          description: Parámetros inválidos o punto fuera del grafo caminable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_request:
                  value:
                    error: invalid_request
                    message: endpoints must be distinct and within CABA
                outside_graph:
                  value:
                    error: origin_or_destination_outside_walkable_graph
                    message: origin or destination is too far from the walkable road network
        "404":
          description: No hay camino caminable entre los puntos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: route_not_found
                message: no walkable route between the points
        "503":
          description: No hay modelo de riesgo activo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: risk_model_unavailable
                message: no active risk model is available
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          example: invalid_request
        message:
          type: string
          example: descripción del error

    GeoJSONPoint:
      type: object
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          enum:
            - Point
        coordinates:
          type: array
          items:
            type: number
            format: double
          minItems: 2
          maxItems: 2
          description: "[longitude, latitude]"
          example: [-58.3816, -34.6037]

    GeoJSONLineString:
      type: object
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          enum:
            - LineString
        coordinates:
          type: array
          items:
            type: array
            items:
              type: number
              format: double
            minItems: 2
          description: "Array de puntos [longitude, latitude]"
          example:
            - [-58.3816, -34.6037]
            - [-58.3820, -34.6010]
            - [-58.4201, -34.5895]

    Crime:
      type: object
      properties:
        source_id:
          type: string
          example: "2023-00001"
        year:
          type: integer
          example: 2023
        month:
          type: integer
          example: 6
        day:
          type: integer
          example: 15
        date:
          type: string
          example: "2023-06-15"
        hour:
          type: integer
          nullable: true
          example: 22
        crime_type:
          type: string
          example: "Robo"
        crime_subtype:
          type: string
          nullable: true
          example: "Robo con arma"
        weapon_used:
          type: boolean
          nullable: true
          example: true
        motorcycle_used:
          type: boolean
          nullable: true
          example: false
        neighborhood:
          type: string
          nullable: true
          example: "Palermo"
        commune:
          type: integer
          nullable: true
          example: 14
        quantity:
          type: integer
          example: 1
        location:
          $ref: "#/components/schemas/GeoJSONPoint"

    NearbyCrimesResponse:
      type: object
      required:
        - lat
        - lng
        - radius_meters
        - count
        - items
      properties:
        lat:
          type: number
          format: double
          example: -34.6037
        lng:
          type: number
          format: double
          example: -58.3816
        radius_meters:
          type: integer
          example: 300
        count:
          type: integer
          example: 5
        items:
          type: array
          items:
            $ref: "#/components/schemas/Crime"

    Waypoint:
      type: object
      required:
        - lat
        - lng
      properties:
        lat:
          type: number
          format: double
          example: -34.6037
        lng:
          type: number
          format: double
          example: -58.3816

    RouteResponse:
      type: object
      required:
        - origin
        - destination
        - profile
        - distance_meters
        - duration_seconds
        - geometry
      properties:
        origin:
          $ref: "#/components/schemas/Waypoint"
        destination:
          $ref: "#/components/schemas/Waypoint"
        profile:
          type: string
          enum:
            - driving-car
            - foot-walking
            - cycling-regular
          example: driving-car
        distance_meters:
          type: number
          format: double
          example: 3241.5
        duration_seconds:
          type: number
          format: double
          example: 478.2
        geometry:
          $ref: "#/components/schemas/GeoJSONLineString"

    SafeRoutesResponse:
      type: object
      required:
        - origin
        - destination
        - datetime
        - time_bucket
        - weekday_type
        - model_version
        - routes
      properties:
        origin:
          $ref: "#/components/schemas/LatLng"
        destination:
          $ref: "#/components/schemas/LatLng"
        datetime:
          type: string
          format: date-time
          example: "2026-06-12T23:00:00-03:00"
        time_bucket:
          type: string
          enum: [morning, afternoon, evening, night]
          example: night
        weekday_type:
          type: string
          enum: [weekday, weekend]
          example: weekday
        model_version:
          type: object
          properties:
            id: { type: integer, format: int64, example: 4 }
            name: { type: string, example: network_temporal_edge_risk_v1 }
            type: { type: string, example: deterministic_network_kde }
            train_until: { type: string, format: date, example: "2025-12-31" }
        routes:
          type: array
          description: fastest, balanced, safest y least_safe_candidate (este último puede omitirse si no hay candidatos KSP).
          items:
            $ref: "#/components/schemas/SafeRoute"

    SafeRoute:
      type: object
      required:
        - kind
        - distance_meters
        - duration_minutes
        - risk_score
        - risk_level
        - crime_metrics
        - geometry
      properties:
        kind:
          type: string
          enum: [fastest, balanced, safest, least_safe_candidate]
        distance_meters: { type: number, format: double, example: 4300 }
        duration_minutes: { type: number, format: double, example: 57 }
        risk_score: { type: number, format: double, minimum: 0, maximum: 1, example: 0.31 }
        risk_level:
          type: string
          enum: [low, moderate, high]
        extra_distance_vs_fastest_meters: { type: number, format: double, example: 500 }
        extra_duration_vs_fastest_minutes: { type: number, format: double, example: 7 }
        risk_reduction_vs_fastest_percent: { type: number, format: double, example: 42.5 }
        high_risk_edge_meters: { type: number, format: double, example: 240 }
        high_risk_edge_percent: { type: number, format: double, example: 5.6 }
        max_edge_risk: { type: number, format: double, example: 0.82 }
        avg_edge_risk: { type: number, format: double, example: 0.24 }
        crime_metrics:
          type: object
          description: Sumas de métricas por tramo (exposición estimada, no incidentes distintos).
          properties:
            crime_count: { type: integer, example: 126 }
            robbery_count: { type: integer, example: 72 }
            theft_count: { type: integer, example: 31 }
            threats_count: { type: integer, example: 8 }
            armed_count: { type: integer, example: 24 }
            motorcycle_count: { type: integer, example: 17 }
            same_bucket_crime_count: { type: integer, example: 38 }
        geometry:
          $ref: "#/components/schemas/GeoJSONLineString"

    LatLng:
      type: object
      required: [lat, lng]
      properties:
        lat: { type: number, format: double, example: -34.58 }
        lng: { type: number, format: double, example: -58.42 }
